{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Release.Name }}-httpd
  labels:
    app: {{ .Release.Name }}-httpd
spec:
  to:
    kind: Service
    name: {{ .Release.Name }}-httpd
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
